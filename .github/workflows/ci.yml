name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: swift test (macOS)
    runs-on: macos-14

    steps:
      - uses: actions/checkout@v4

      - name: Show toolchain versions
        run: |
          xcode-select -p
          swift --version

      - name: Build
        run: swift build --product FloatingMacro

      - name: Unit tests
        run: swift test --parallel

      - name: fmcli smoke
        run: bash scripts/fmcli_smoke.sh

      # The control API smoke spawns the real GUI binary and drives it via
      # curl. It works on a developer machine but macos-14 runners do not
      # have an active window server to host NSPanel, so we skip it in CI.
      # Run it locally before tagging a release.
